# ==========================================
# BASE DE DATOS LOCAL (Cero Instalación)
# ==========================================
# Esto creará una carpeta "DatosTienda" junto a tu .exe con el archivo de la base de datos
spring.datasource.url=jdbc:h2:file:./DatosTienda/titan_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=1234

# Configuracion de Hibernate para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- DEJA AQUÍ ABAJO TU CONFIGURACIÓN DE CORREO EXACTAMENTE COMO ESTABA ---

# Configuracion para envio de correos (Puerto 465 SSL)
# ConfiguraciÃģn genÃĐrica para envÃ­o de correos (SSL)
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000